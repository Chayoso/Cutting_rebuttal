world:
  grid_resolution: 120
  bounds_min:
  - -0.25
  - 0.0
  - -0.25
  bounds_max:
  - 0.25
  - 0.5
  - 0.25
  dt: 2.0e-05
  substeps: 6
  gravity:
  - 0.0
  - -9.81
  - 0.0
  reso_exponent: 1.0
cutting_mesh:
  mesh_path: assets/fruits/watermelon_slice.obj
  sdf_voxel: 80
  density: 950.0
  particle_spacing: 0.0025
  elasticity:
    youngs_modulus: 1200000.0
    poisson_ratio: 0.33
  grid_damping_ratio: 0.06
  particle_damping: 0.05
  restitution: 0.005
knife:
  mesh_path: assets/knife.obj
  sdf_voxel: 160
  blade:
    axis: Y
    fraction: 0.55
  motion:
    knife_start_y: 0.125
    knife_stop_y: -0.01
    cutting_speed_mps: 0.3
    return_speed_mps: 1.0
    z_offset: 0.0
  friction: 0.03
  min_speed_floor_ratio: 0.1
  speed_resistance:
    c_norm_scale: 0.35
    k_quad_per_s: 0.0
board:
  mesh_path: assets/board.obj
  sdf_voxel: 160
viewer:
  camera_mode: manual
  initial_camera:
    eye:
    - 0.5
    - 0.3
    - 0.5
    lookat:
    - 0.0
    - 0.1
    - 0.0
    up:
    - 0.0
    - 1.0
    - 0.0
    fov: 35.0
  particle_radius: 0.0015
  knife_render_stride: 4
  lock_on_run: true
  color_update_every: 6
  show_grid: false
cutting:
  slices: 1
  z_margin_ratio: 0.2
  cut_order: left-to-right
  dwell_frames: 6
  tip_force_gain: 0.25
  tip_band: 0.0018
  no_stiffness_drop: true
  tip_post_gain: 0.05
  tip_post_band_mul: 3.0
  tip_reso_exponent: 0.2
  tip_post_above_board_only: true
damage:
  damage_v_hat: 0.35
  damage_band: 0.0025
  damage_visualization: true
plasticity:
  enabled: true
  model: j2
  yield_stress_kpa: 60.0
  hardening_kpa: 0.0
  viscoplastic_gamma: 0.0
stability:
  report_every: 100
  J_warn_min: 0.1
  J_warn_max: 4.0
  max_speed_cap: 2.0
  J_clamp_min: 0.1
  J_clamp_max: 3.0
output:
  enabled: true
  fps: 60.0
  export:
    enabled: false
    out_dir: exports
    format: ply
  logging:
    enabled: true
    out_dir: logs
    axis_map: maniskill
    eef_baseline: 0.0
    eef_scale: 70.0
